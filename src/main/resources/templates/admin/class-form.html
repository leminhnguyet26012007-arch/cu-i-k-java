<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Mở Lớp Học Phần | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-xl mx-auto bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-6 text-slate-800">Mở Lớp Học Phần</h2>

        <form th:action="@{/admin/classes/save}" th:object="${lhp}" method="post" class="space-y-4">
            <!-- Mã lớp -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mã Lớp (VD: IT001.1)</label>
                <input type="text" th:field="*{maLhp}"
                    class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 input-hover-effect"
                    required />
            </div>

            <!-- Học kỳ -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Học Kỳ (VD: 20231)</label>
                <input type="text" th:field="*{maHk}" value="20231"
                    class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 input-hover-effect"
                    required />
            </div>

            <!-- Môn học -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Môn Học</label>
                <select th:field="*{monHoc}"
                    class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500">
                    <option th:each="mh : ${courses}" th:value="${mh.maMH}"
                        th:text="${mh.tenMH + ' (' + mh.maMH + ')'}"></option>
                </select>
            </div>

            <!-- Giảng viên -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Giảng Viên</label>
                <select th:field="*{giangVien}"
                    class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500">
                    <option th:each="teacher : ${teachers}" th:value="${teacher.maGV}" th:text="${teacher.hoTen}">
                    </option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Sĩ số Tối đa</label>
                    <input type="number" th:field="*{siSoToiDa}" value="60"
                        class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500" required />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Sĩ số Hiện tại</label>
                    <input type="number" th:field="*{siSoHienTai}" value="0"
                        class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 bg-slate-100"
                        readonly />
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Phòng học</label>
                    <input type="text" th:field="*{phongHoc}"
                        class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500"
                        placeholder="VD: A2-301" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Lịch học</label>
                    <input type="text" th:field="*{lichHoc}"
                        class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500"
                        placeholder="VD: Thứ 2, Tiết 7-9" />
                </div>
            </div>

            <div class="flex justify-end pt-4">
                <a th:href="@{/admin/classes}" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded mr-2">Hủy</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Lưu</button>
            </div>
        </form>
    </div>
</body>

</html>
