<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm mới Sinh viên | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-xl mx-auto bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-6 text-slate-800">Thêm mới Sinh viên</h2>
        
        <form th:action="@{/admin/students/save}" th:object="${student}" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mã Sinh viên</label>
                <input type="text" th:field="*{maSV}" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 hover:border-blue-400" required />
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Họ và tên</label>
                <input type="text" th:field="*{hoTen}" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 hover:border-blue-400" required />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Ngày sinh</label>
                <input type="date" th:field="*{ngaySinh}" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 hover:border-blue-400" />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Lớp hành chính</label>
                <input type="text" th:field="*{lop}" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 hover:border-blue-400" />
            </div>
            
             <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" th:field="*{email}" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 hover:border-blue-400" />
            </div>

            <div class="flex justify-end pt-4">
                <a th:href="@{/admin/dashboard}" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded mr-2">Hủy</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Lưu</button>
            </div>
        </form>
    </div>
</body>
</html>
