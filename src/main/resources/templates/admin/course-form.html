<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm mới Môn học | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-xl mx-auto bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-6 text-slate-800">Thêm mới Môn học</h2>

        <form th:action="@{/admin/courses/save}" th:object="${course}" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mã Môn học</label>
                <input type="text" th:field="*{maMH}"
                    class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 hover:border-blue-400"
                    required />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Tên Môn học</label>
                <input type="text" th:field="*{tenMH}"
                    class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 hover:border-blue-400"
                    required />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Số Tín chỉ</label>
                <input type="number" th:field="*{soTinChi}"
                    class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 hover:border-blue-400"
                    required min="1" max="10" />
            </div>

            <div class="flex justify-end pt-4">
                <a th:href="@{/admin/courses}" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded mr-2">Hủy</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Lưu</button>
            </div>
        </form>
    </div>
</body>

</html>
