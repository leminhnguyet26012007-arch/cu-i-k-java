<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Điểm danh | Giảng viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-3xl mx-auto bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Điểm danh</h2>
                <p class="text-slate-500" th:text="${lhp.monHoc.tenMH + ' - ' + lhp.maLhp}">Môn học - Lớp</p>
            </div>
            <div class="text-right">
                <p class="font-bold text-lg" th:text="${#temporals.format(today, 'dd/MM/yyyy')}">01/01/2023</p>
            </div>
        </div>

        <div th:if="${message}" class="mb-4 p-4 bg-green-100 text-green-700 rounded">
            <span th:text="${message}">Thành công</span>
        </div>

        <form th:action="@{/teacher/attendance/save}" method="post">
            <input type="hidden" name="lhpId" th:value="${lhp.id}" />

            <div class="overflow-x-auto mb-6">
                <table class="w-full text-left">
                    <thead class="bg-slate-100">
                        <tr>
                            <th class="p-3 font-semibold text-slate-600 w-16 text-center">STT</th>
                            <th class="p-3 font-semibold text-slate-600">Mã SV</th>
                            <th class="p-3 font-semibold text-slate-600">Họ và tên</th>
                            <th class="p-3 font-semibold text-slate-600 text-center">Có mặt</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="dk, iterStat : ${registrations}" class="hover:bg-slate-50">
                            <td class="p-3 text-center text-slate-500" th:text="${iterStat.count}">1</td>
                            <td class="p-3" th:text="${dk.sinhVien.maSV}">SV01</td>
                            <td class="p-3" th:text="${dk.sinhVien.hoTen}">Nguyen Van A</td>
                            <td class="p-3 text-center">
                                <input type="checkbox" name="studentIds" th:value="${dk.sinhVien.maSV}"
                                    class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500" checked />
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="flex justify-between items-center pt-4 border-t">
                <a th:href="@{/teacher/my-classes}" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">Quay
                    lại</a>
                <button type="submit"
                    class="px-6 py-2 bg-blue-600 text-white rounded font-medium hover:bg-blue-700 shadow-sm transition">Lưu
                    điểm danh</button>
            </div>
        </form>
    </div>
</body>

</html>
