<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Giảng viên Dashboard | QLSV</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-600">QLSV <span class="text-slate-500 font-normal">| Portal Giảng
                    viên</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <span th:if="${myself != null}" class="text-slate-600 font-medium" th:text="${myself.hoTen}">Nguyễn Văn
                A</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="text-sm text-red-600 hover:text-red-800 font-medium">Đăng xuất</button>
            </form>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <!-- Welcome Section -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-slate-800">Thông tin cá nhân</h2>
            <div class="mt-4 bg-white p-6 rounded-lg shadow-sm border border-slate-200 grid grid-cols-2 gap-4 max-w-2xl"
                th:if="${myself != null}">
                <div>
                    <p class="text-sm text-slate-500">Mã giảng viên</p>
                    <p class="font-medium text-lg" th:text="${myself.maGV}">GV001</p>
                </div>
                <div>
                    <p class="text-sm text-slate-500">Khoa</p>
                    <p class="font-medium text-lg" th:text="${myself.khoa}">Công nghệ thông tin</p>
                </div>
                <div>
                    <p class="text-sm text-slate-500">Email</p>
                    <p class="font-medium text-lg" th:text="${myself.email}">gv@school.com</p>
                </div>
            </div>
            <div th:unless="${myself != null}"
                class="p-4 bg-yellow-50 text-yellow-700 rounded border border-yellow-200">
                Không tìm thấy thông tin giảng viên liên kết với tài khoản này.
            </div>
        </div>

        <!-- Student Management (Simplified) -->
        <div>
            <h2 class="text-2xl font-bold text-slate-800 mb-4">Danh sách sinh viên</h2>
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-semibold text-slate-600">Mã SV</th>
                            <th class="p-4 font-semibold text-slate-600">Họ và tên</th>
                            <th class="p-4 font-semibold text-slate-600">Lớp</th>
                            <th class="p-4 font-semibold text-slate-600">Hành động</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="sv : ${students}">
                            <td class="p-4" th:text="${sv.maSV}">SV001</td>
                            <td class="p-4" th:text="${sv.hoTen}">Trần Văn B</td>
                            <td class="p-4" th:text="${sv.lop}">K64CNPM</td>
                            <td class="p-4">
                                <button class="text-blue-600 hover:text-blue-800 text-sm font-medium">Nhập điểm</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>

</html>
