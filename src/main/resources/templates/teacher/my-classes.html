<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lớp học của tôi | Giảng viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-slate-800">Lớp học phần phụ trách</h2>
            <a th:href="@{/teacher/dashboard}" class="text-blue-600 hover:text-blue-800">Quay lại Dashboard</a>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-100 border-b border-slate-200">
                    <tr>
                        <th class="p-4 font-semibold text-slate-600">Mã Lớp</th>
                        <th class="p-4 font-semibold text-slate-600">Môn học</th>
                        <th class="p-4 font-semibold text-slate-600">Phòng/Lịch</th>
                        <th class="p-4 font-semibold text-slate-600">Sĩ số</th>
                        <th class="p-4 font-semibold text-slate-600 text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr th:each="c : ${classes}" class="hover:bg-slate-50">
                        <td class="p-4 font-medium" th:text="${c.maLhp}">IT001.1</td>
                        <td class="p-4" th:text="${c.monHoc.tenMH}">Lập trình Java</td>
                        <td class="p-4">
                            <div th:text="${c.phongHoc}">A2-101</div>
                            <div class="text-xs text-slate-500" th:text="${c.lichHoc}">T2, 7-9</div>
                        </td>
                        <td class="p-4">
                            <span th:text="${c.siSoHienTai}">30</span>/<span th:text="${c.siSoToiDa}">60</span>
                        </td>
                        <td class="p-4 flex gap-2 justify-center">
                            <a th:href="@{'/teacher/attendance/' + ${c.id}}"
                                class="px-3 py-1 bg-green-100 text-green-700 rounded hover:bg-green-200 text-sm font-medium">Điểm
                                danh</a>
                            <a th:href="@{'/teacher/grading/' + ${c.id}}"
                                class="px-3 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 text-sm font-medium">Nhập
                                điểm</a>
                        </td>
                    </tr>
                    <tr th:if="${classes == null || classes.empty}">
                        <td colspan="5" class="p-8 text-center text-slate-500">Bạn chưa được phân công lớp nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
