<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nhập điểm | Giảng viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[readonly] {
            background-color: #f1f5f9;
            /* Slate-100 */
            color: #64748b;
            /* Slate-500 */
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-5xl mx-auto bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Nhập điểm quá trình & Thi</h2>
                <p class="text-slate-500" th:text="${lhp.monHoc.tenMH + ' - ' + lhp.maLhp}">Môn học - Lớp</p>
            </div>
            <div class="flex gap-2">
                <form th:action="@{/teacher/grading/lock}" method="post"
                    onsubmit="return confirm('Bạn có chắc chắn muốn KHÓA bảng điểm? Sau khi khóa sẽ không thể chỉnh sửa.');">
                    <input type="hidden" name="lhpId" th:value="${lhp.id}" />
                    <button type="submit"
                        class="px-4 py-2 bg-orange-100 text-orange-700 rounded hover:bg-orange-200 font-medium border border-orange-200">Khóa
                        điểm</button>
                </form>
            </div>
        </div>

        <div th:if="${message}" class="mb-4 p-4 bg-green-100 text-green-700 rounded border border-green-200">
            <span th:text="${message}">Thành công</span>
        </div>

        <form th:action="@{/teacher/grading/save}" method="post">
            <input type="hidden" name="lhpId" th:value="${lhp.id}" />

            <div class="overflow-x-auto mb-6">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 border-b border-slate-300">
                        <tr>
                            <th class="p-3 font-semibold text-slate-600 w-12 text-center">#</th>
                            <th class="p-3 font-semibold text-slate-600">Mã SV</th>
                            <th class="p-3 font-semibold text-slate-600">Họ và tên</th>
                            <th class="p-3 font-semibold text-slate-600 text-center w-32">Điểm QT (40%)</th>
                            <th class="p-3 font-semibold text-slate-600 text-center w-32">Điểm Thi (60%)</th>
                            <th class="p-3 font-semibold text-slate-600 text-center w-24">Tổng kết</th>
                            <th class="p-3 font-semibold text-slate-600 text-center w-20">Điểm chữ</th>
                            <th class="p-3 font-semibold text-slate-600 text-center">Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200">
                        <tr th:each="d, iterStat : ${diems}" class="hover:bg-slate-50">
                            <td class="p-3 text-center text-slate-500" th:text="${iterStat.count}">1</td>
                            <td class="p-3" th:text="${d.sinhVien.maSV}">SV01</td>
                            <td class="p-3" th:text="${d.sinhVien.hoTen}">Nguyen Van A</td>

                            <!-- Hidden ID for binding -->
                            <input type="hidden" name="diemIds" th:value="${d.id}" />

                            <td class="p-2 text-center">
                                <input type="number" step="0.1" min="0" max="10" name="diemQTs" th:value="${d.diemQT}"
                                    class="w-full p-2 border border-slate-300 rounded text-center focus:ring-2 focus:ring-blue-500"
                                    th:readonly="${d.locked}" />
                            </td>
                            <td class="p-2 text-center">
                                <input type="number" step="0.1" min="0" max="10" name="diemThis" th:value="${d.diemThi}"
                                    class="w-full p-2 border border-slate-300 rounded text-center focus:ring-2 focus:ring-blue-500"
                                    th:readonly="${d.locked}" />
                            </td>

                            <td class="p-3 text-center font-bold text-slate-700" th:text="${d.diemTongKet}">8.5</td>
                            <td class="p-3 text-center font-bold" th:text="${d.diemChu}">A</td>
                            <td class="p-3 text-center text-xs">
                                <span th:if="${d.locked}" class="px-2 py-1 bg-slate-200 text-slate-600 rounded">Đã
                                    khóa</span>
                                <span th:unless="${d.locked}"
                                    class="px-2 py-1 bg-green-100 text-green-700 rounded">Mở</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="flex justify-between items-center pt-4 border-t">
                <a th:href="@{/teacher/my-classes}" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">Quay
                    lại</a>
                <button type="submit"
                    class="px-6 py-2 bg-blue-600 text-white rounded font-medium hover:bg-blue-700 shadow-sm transition">Lưu
                    điểm</button>
            </div>
        </form>
    </div>
</body>

</html>
