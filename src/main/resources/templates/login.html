<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập QLSV</title>
    <!-- Tailwind CSS CDN for instant styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center text-white">

<div class="bg-gray-800 p-8 rounded-lg shadow-2xl w-96 border border-gray-700">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-400 mb-2">QLSV System</h1>
        <p class="text-gray-400">Cổng thông tin đào tạo</p>
    </div>

    <!-- Error Message -->
    <div th:if="${param.error}" class="bg-red-500/10 border border-red-500 text-red-400 p-3 rounded mb-4 text-sm text-center">
        Sai tên đăng nhập hoặc mật khẩu!
    </div>
    <!-- Logout Message -->
    <div th:if="${param.logout}" class="bg-green-500/10 border border-green-500 text-green-400 p-3 rounded mb-4 text-sm text-center">
        Đã đăng xuất thành công.
    </div>

    <form th:action="@{/login}" method="post" class="space-y-4">
        <div>
            <label class="block text-gray-300 text-sm font-bold mb-2">Tên đăng nhập</label>
            <input type="text" name="username" class="w-full bg-gray-700 text-white border border-gray-600 rounded p-3 focus:outline-none focus:border-blue-500" placeholder="admin, sv01, gv01..." required autofocus>
        </div>
        <div>
            <label class="block text-gray-300 text-sm font-bold mb-2">Mật khẩu</label>
            <input type="password" name="password" class="w-full bg-gray-700 text-white border border-gray-600 rounded p-3 focus:outline-none focus:border-blue-500" placeholder="••••••" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition duration-200">
            Đăng nhập
        </button>
    </form>
    
    <div class="mt-6 text-center text-xs text-gray-500">
        <p>TK Demo: admin/123 | gv01/123 | sv01/123</p>
    </div>
</div>

</body>
</html>
